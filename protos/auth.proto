syntax = "proto3";

package auth;

option  go_package = "pkg/auth-api";

// auth servuce by jwt
service Auth {
    // check service health
    rpc Health(Empty) returns (ServiceStatus);

    // register user by username, password
    rpc Register(User) returns (JwtTokens); 

    // login user by username, password
    rpc Login(User) returns (JwtTokens);

    // delete user with given access token and password
    rpc DeleteUser(DeleteUserRequest) returns (DeleteUserStatus);
    
    // change user's password from old to new
    rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordStatus);

    // Send verification email if user didn't get it after registration
    rpc SendVerificationEmail(AccessToken) returns (AcceptStatus);
    
    // Verify user email by token
    rpc VerifyEmail(VerifToken) returns (JwtTokens);

    // if token valid retursn token payload
    rpc IsTokenValid(AccessToken) returns (TokenPayload);

    // refresh access, refresh tokens if they are valid
    rpc RefreshTokens(RefreshToken) returns (JwtTokens);
}

enum Role {
    ADMIN = 0;
    EMPLOYEE = 1;
    EMPLOYER = 2;
}


message User {
    string email = 1;
    string password = 2;
    Role role = 3; // ADMIN, EMPLOYEE, EMPLOYER
}


message AccessToken {
    string access = 1;
}

message RefreshToken {
    string refresh = 1;
}

message JwtTokens {
    string access = 1;
    string refresh = 2;
}

message TokenPayload {
    string id = 1;
    bool verificated = 2;
    Role role = 3;
}


message VerifToken {
    string token = 1;
}

message AcceptStatus {
    bool accepted = 1;
}

message DeleteUserRequest {
    string access = 1; // access jwt token
    string password = 2; // user password
}

message DeleteUserStatus {
    bool deleted = 1;
}

message ChangePasswordRequest {
    string access = 1; // access jwt token
    string old = 2; // old password
    string new = 3; // new password
}

message ChangePasswordStatus {
    bool changed = 1;
}

message Empty {
}

message ServiceStatus {
    int32 code = 1;
}