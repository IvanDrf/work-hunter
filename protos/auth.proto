syntax = "proto3";

package auth;

option  go_package = "pkg/auth-api";

// auth servuce by jwt
service Auth {
    // register user by username, password
    rpc Register(User) returns (JwtTokens); 

    // login user by username, password
    rpc Login(User) returns (JwtTokens);
    
    // verify email
    rpc VerifyEmail(Email) returns (Verification);
    
    // refresh access, refresh tokens if they are valid
    rpc RefreshTokens(RefreshToken) returns (JwtTokens);
    
    // returns id, verification status(email)
    rpc GetTokensPayload(JwtTokens) returns (TokensPayload);
}

message User {
    string email = 1;
    string password = 2;
}

message RefreshToken {
    string refresh = 1;
}

message JwtTokens {
    string access = 1;
    string refresh = 2;
}

message Email {
    string email = 1;
}

message Verification {
    bool status = 1;
}

message TokensPayload {
    string id = 1;
    bool verificated = 2;
}
