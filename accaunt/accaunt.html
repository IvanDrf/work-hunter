<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="accaunt.css" />
    <title>work-hunter</title>
  </head>
  <body>
    <div class="border"></div>
    <div class="card-user">
      <img src="user-img.png" alt="user img error" class="user-img" />
      <div class="user-info">
        <h2>Имя</h2>
        <h2>Фамилия</h2>
        <h2>Дата рождения</h2>
        <h2>Статус</h2>
      </div>
    </div>
    <div class="extra-info">
      <div class="card-contacts">
        <div class="card-title">
          <h2>Контакты</h2>
        </div>
        <h2>Иконки соц.сетей</h2>
      </div>
      <div class="card-job">
        <div class="card-title">
          <h2>Работа</h2>
        </div>
        <h2>Должность</h2>
        <h2>Опыт работы</h2>
      </div>
    </div>
    <div class="card-portfolio">
      <div class="card-title">
        <h2>Портфолио</h2>
      </div>
    </div>
    <button class="add-portfolio">Добавить PDF</button>
  </body>
</html>
